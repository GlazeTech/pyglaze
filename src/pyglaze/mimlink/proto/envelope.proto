}

// --- Reliable Streaming (NAK-based retransmission) ---

// Request retransmission of a specific point (host to device)
message ResultPointNak {
  uint32 point_index = 1;  // Index of the missing point to retransmit
}

// Response to NAK - retransmitted point or unavailable notification
message ResultPointRetransmit {
  uint32 point_index = 1;  // Index of the retransmitted point
  bool available = 2;      // False if point aged out of circular buffer
  float time = 3;          // Only valid if available=true
  float x = 4;             // Only valid if available=true
  float y = 5;             // Only valid if available=true
}

// --- Reliable Bulk Transfer (NAK-based retransmission for results chunks) ---

// Request retransmission of a specific results chunk (host to device)
