repos:
  - repo: local
    hooks:
      - id: ruff
        name: Run ruff linter
        entry: uv run ruff check .
        language: system
        types: [python]
        pass_filenames: false
      - id: ruff-format
        name: Run ruff formatter
        entry: uv run ruff format . --check
        language: system
        types: [python]
        pass_filenames: false
      - id: ty
        name: Run ty type checker
        entry: uv run ty check .
        language: system
        types: [python]
        pass_filenames: false
