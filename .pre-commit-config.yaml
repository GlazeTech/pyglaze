repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.10
    hooks:
      - id: ruff
        name: Run ruff linter
      - id: ruff-format
        name: Run ruff formatter
        args: [--check]
  - repo: local
    hooks:
      - id: ty
        name: Run ty type checker
        entry: ty check .
        language: system
        types: [python]
        pass_filenames: false