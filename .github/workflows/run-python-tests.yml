name: Tests
run-name: Tests
on:
  - pull_request

jobs:
  test:
    timeout-minutes: 15
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v5
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Build and install package
        run: |
          uv sync --extra build
          uv run python -m build
          uv run python scripts/install_wheel.py
      - name: Run twine check
        run: uv run python scripts/check_wheel.py
      - name: Run pytest
        run: |
          uv sync --extra test
          uv run pytest

  code-validation:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Set up Buf
        uses: bufbuild/buf-setup-action@v1.50.0
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Run buf lint
        run: buf lint
      - name: Regenerate vendored protobuf artifacts
        run: uv run ./scripts/generate_mimlink_proto.sh
      - name: Check generated protobuf drift
        run: git diff --exit-code -- src/pyglaze/mimlink/proto/envelope_pb2.py src/pyglaze/mimlink/proto/envelope_pb2.pyi
      - name: Run ruff linter
        run: uv run ruff check .
      - name: Run ruff formatter
        run: uv run ruff format . --check
      - name: Run ty type checker
        run: uv run ty check .

  docs:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Install dependencies
        run: uv sync --extra docs
      - name: Test docs build
        run: uv run mkdocs build --strict

  version-validation:
    if: github.base_ref == 'main'
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.GLAZE_CICD_UTILS_SECRET }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan github.com >> ~/.ssh/known_hosts
      - uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - name: Install CI/CD utils
        run: pip install git+ssh://git@github.com/GlazeTech/CICD-utils.git
      - name: Validate version number
        run: check-version-number --monitored-paths src/pyglaze/ --version-files pyproject.toml
